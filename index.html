<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おそうじシェア</title>
<style>
  :root{
    --bg:#FFF8F0;
    --card:#FFFFFF;
    --ink:#3A2E2A;
    --muted:#9A8E84;
    --border:#F0E6D8;
    --accent:#FF6F59;
    --accent-dark:#E04A36;
    --success:#06D6A0;
    --success-dark:#04966F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic Medium","Yu Gothic","Noto Sans JP",sans-serif;
  }
  .app{max-width:480px;margin:0 auto;padding:20px 16px 96px;min-height:100vh;}
  .app-title{display:flex;align-items:center;gap:8px;margin:0;font-size:21px;font-weight:700;}
  .app-sub{margin:2px 0 20px;font-size:13px;color:var(--muted);}
  .card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,46,42,0.06);}
  .segmented{display:flex;background:#F4E9DA;border-radius:14px;padding:4px;margin-bottom:16px;}
  .seg-btn{flex:1;border:none;background:transparent;padding:9px 0;border-radius:10px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;}
  .seg-btn.active{background:#fff;color:var(--accent-dark);box-shadow:0 1px 4px rgba(58,46,42,0.10);}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .progress-top span:first-child{font-size:13px;color:var(--muted);}
  .progress-top span:last-child{font-size:16px;font-weight:700;}
  .progress-track{height:8px;background:#F4E9DA;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--success);border-radius:99px;transition:width .25s ease;}
  .room-block{margin-bottom:6px;}
  .room-head{display:flex;align-items:center;gap:8px;padding:14px 2px 6px;font-size:14px;font-weight:700;}
  .task-row{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:10px 12px;margin-bottom:8px;box-shadow:0 1px 6px rgba(58,46,42,0.05);}
  .check-btn{width:30px;height:30px;flex-shrink:0;border:2px solid #E3D6C6;background:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:transparent;padding:0;font-family:inherit;}
  .check-btn.done{border-color:var(--success);background:var(--success);color:#fff;}
  .task-body{flex:1;min-width:0;}
  .task-name{font-size:15px;font-weight:700;margin:0 0 3px;}
  .task-name.done{color:var(--muted);text-decoration:line-through;}
  .task-meta{font-size:12px;color:var(--muted);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;margin-right:6px;}
  .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .empty-note{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);margin:18px 2px 8px;letter-spacing:.02em;}
  .partner-row{display:flex;gap:10px;}
  .partner-card{flex:1;background:var(--card);border-radius:16px;padding:14px;box-shadow:0 1px 6px rgba(58,46,42,0.05);}
  .partner-avatar-preview{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 8px;}
  .text-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;text-align:center;margin-bottom:8px;}
  .swatch-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;}
  .swatch.selected{border-color:var(--ink);}
  .room-card{background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(58,46,42,0.05);}
  .room-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .icon-select{font-size:18px;border:1.5px solid var(--border);border-radius:10px;padding:4px;background:#fff;font-family:inherit;}
  .room-name-input{flex:1;border:none;background:transparent;font-size:15px;font-weight:700;color:var(--ink);font-family:inherit;padding:4px 2px;border-bottom:1.5px solid transparent;}
  .room-name-input:focus{outline:none;border-bottom-color:var(--accent);}
  .icon-btn{border:none;background:transparent;cursor:pointer;font-size:16px;color:var(--muted);padding:4px 6px;font-family:inherit;}
  .room-color-row{display:flex;gap:5px;margin-bottom:10px;}
  .setting-task-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border);flex-wrap:wrap;}
  .setting-task-name{flex:1 1 100%;border:none;background:transparent;font-size:13.5px;color:var(--ink);font-family:inherit;padding:3px 2px;border-bottom:1.5px solid transparent;min-width:120px;}
  .setting-task-name:focus{outline:none;border-bottom-color:var(--accent);}
  .freq-btn{border:1.5px solid var(--border);background:#fff;border-radius:99px;padding:4px 10px;font-size:11.5px;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:700;}
  .freq-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .freq-custom{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted);}
  .freq-custom input{width:40px;border:1.5px solid var(--border);border-radius:8px;padding:3px 4px;font-size:12px;text-align:center;font-family:inherit;}
  .assignee-select{border:1.5px solid var(--border);border-radius:10px;padding:4px 6px;font-size:12px;font-family:inherit;background:#fff;}
  .delete-x{border:none;background:transparent;color:#D88;font-size:16px;cursor:pointer;padding:2px 4px;font-family:inherit;}
  .confirm-row{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .add-link{border:none;background:transparent;color:var(--accent-dark);font-size:13px;font-weight:700;cursor:pointer;padding:8px 2px 2px;font-family:inherit;}
  .add-room-btn{width:100%;border:1.5px dashed #E3D6C6;background:transparent;color:var(--muted);font-size:14px;font-weight:700;border-radius:14px;padding:12px;cursor:pointer;font-family:inherit;}
  .reset-link{display:block;text-align:center;margin-top:18px;font-size:12px;color:var(--muted);background:none;border:none;text-decoration:underline;cursor:pointer;font-family:inherit;}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;max-width:480px;margin:0 auto;}
  .tab-btn{flex:1;border:none;background:transparent;padding:10px 0 12px;text-align:center;cursor:pointer;font-family:inherit;}
  .tab-btn .ic{display:block;font-size:18px;}
  .tab-btn .lb{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
  .tab-btn.active .lb{color:var(--accent-dark);font-weight:700;}
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--ink);color:#fff;font-size:12.5px;padding:7px 14px;border-radius:99px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading{text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="app">
  <h1 class="app-title">🧼 おそうじシェア</h1>
  <p class="app-sub">ふたりの掃除リスト <span id="sync-status" style="color:var(--muted);">・準備中</span></p>
  <div id="content"><div class="loading">読み込み中…</div></div>
</div>
<div class="tabbar">
  <button class="tab-btn active" data-action="switch-tab" data-tab="home"><span class="ic">🏠</span><span class="lb">今日</span></button>
  <button class="tab-btn" data-action="switch-tab" data-tab="settings"><span class="ic">⚙️</span><span class="lb">設定</span></button>
</div>
<div class="toast" id="toast">保存しました</div>

<script>
/* ===== 同期の設定 =====
   1. Googleスプレッドシートを新規作成
   2. 拡張機能 > Apps Script を開き、別途案内したコードを貼り付けて保存
   3. 「デプロイ」>「新しいデプロイ」> 種類「ウェブアプリ」
      アクセスできるユーザー「全員」に設定してデプロイ
   4. 発行されたURL(.../exec で終わるもの)を下の SCRIPT_URL に貼り付ける
   5. このファイルをGitHub Pagesなどにアップロードして、二人のスマホで同じURLを開く
*/
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQtAeiA3eRTePuuWlKHCxNSTZqCw1QMNFJ89PC8PvgUmIenDkCJagP8bq0MxSZoiGV/exec';
var CACHE_KEY = 'kaji-share-cache-v1';
var POLL_MS = 10000;
var isSaving = false;
var isOnline = true;

var state = null;
var activeTab = 'home';
var activeScope = 'today';
var pendingDelete = null;

function uid(){ return Math.random().toString(36).slice(2,9); }

function todayISO(){
  var d = new Date();
  d.setHours(0,0,0,0);
  return isoOf(d);
}
function isoOf(d){
  var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function parseISO(s){
  var p=s.split('-');
  return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
}
function addDays(d, n){
  var r = new Date(d.getTime());
  r.setDate(r.getDate()+n);
  return r;
}
function fmtShort(s){
  var d = parseISO(s);
  return (d.getMonth()+1)+'/'+d.getDate();
}
function daysUntilDue(task){
  if(!task.lastDone) return -9999;
  var due = addDays(parseISO(task.lastDone), task.intervalDays);
  var t = parseISO(todayISO());
  return Math.round((due - t)/86400000);
}
function isDoneToday(task){ return task.lastDone === todayISO(); }

function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function hexToRgb(hex){
  hex = hex.replace('#','');
  var num = parseInt(hex,16);
  return {r:(num>>16)&255, g:(num>>8)&255, b:num&255};
}
function toHex(r,g,b){
  return '#'+[r,g,b].map(function(v){ return Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0'); }).join('');
}
function darken(hex, amount){
  var c = hexToRgb(hex);
  return toHex(c.r*(1-amount), c.g*(1-amount), c.b*(1-amount));
}
function tint(hex, amount){
  var c = hexToRgb(hex);
  return toHex(c.r+(255-c.r)*amount, c.g+(255-c.g)*amount, c.b+(255-c.b)*amount);
}
function contrastText(hex){
  var c = hexToRgb(hex);
  var lum = (0.299*c.r+0.587*c.g+0.114*c.b)/255;
  return lum > 0.62 ? '#3A2E2A' : '#FFFFFF';
}

var ROOM_PALETTE = ['#4CC9F0','#FFD166','#06D6A0','#F4A261','#9D8DF1','#2EC4B6','#F72585','#FF9F1C'];
var PARTNER_PALETTE = ['#FF6F59','#4CC9F0','#06D6A0','#9D8DF1','#F72585','#FFD166'];
var ICON_OPTIONS = ['🪞','🍳','🛋️','🚽','🛏️','🛁','🏠','🧺','🪟','🧹','🌿','🚪','🐜','✨','🧴','🗑️'];

function defaultState(){
  var today = todayISO();
  function back(n){ return isoOf(addDays(parseISO(today), -n)); }
  return {
    partners:[
      {id:'a', name:'あなた', color:'#FF6F59'},
      {id:'b', name:'パートナー', color:'#4CC9F0'}
    ],
    rooms:[
      {id:'r1', name:'洗面所', color:'#4CC9F0', icon:'🪞'},
      {id:'r2', name:'キッチン', color:'#FFD166', icon:'🍳'},
      {id:'r3', name:'リビング', color:'#06D6A0', icon:'🛋️'},
      {id:'r4', name:'トイレ', color:'#F4A261', icon:'🚽'},
      {id:'r5', name:'寝室', color:'#9D8DF1', icon:'🛏️'},
      {id:'r6', name:'浴室', color:'#2EC4B6', icon:'🛁'},
      {id:'r7', name:'家全体', color:'#F72585', icon:'🏠'}
    ],
    tasks:[
      {id:'t1', roomId:'r1', name:'洗面台・鏡を拭く', intervalDays:4, assigneeId:'a', lastDone:back(3)},
      {id:'t2', roomId:'r2', name:'シンク・コンロ拭き', intervalDays:1, assigneeId:'a', lastDone:today},
      {id:'t3', roomId:'r3', name:'掃除機がけ', intervalDays:1, assigneeId:'b', lastDone:back(1)},
      {id:'t4', roomId:'r4', name:'トイレ掃除', intervalDays:7, assigneeId:'b', lastDone:back(4)},
      {id:'t5', roomId:'r5', name:'シーツ交換', intervalDays:7, assigneeId:'a', lastDone:back(7)},
      {id:'t6', roomId:'r6', name:'浴室のカビ取り・排水溝', intervalDays:30, assigneeId:'b', lastDone:back(20)},
      {id:'t7', roomId:'r7', name:'くん煙剤で害虫対策', intervalDays:60, assigneeId:'a', lastDone:back(50)}
    ]
  };
}

function partnerById(id){
  return state.partners.find(function(p){ return p.id===id; });
}
function roomById(id){
  return state.rooms.find(function(r){ return r.id===id; });
}

function setSyncStatus(text, kind){
  var el = document.getElementById('sync-status');
  if(!el) return;
  var color = kind==='ok' ? 'var(--success-dark)' : (kind==='warn' ? '#C0392B' : 'var(--muted)');
  el.style.color = color;
  el.textContent = '・'+text;
}
function readCache(){
  try{
    var raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function writeCache(s){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify(s)); }catch(e){ /* 無視 */ }
}
function isConfigured(){
  return SCRIPT_URL && SCRIPT_URL.indexOf('PASTE_YOUR_APPS_SCRIPT_URL_HERE')===-1;
}
function isEditingNow(){
  var a = document.activeElement;
  if(!a) return false;
  var tag = a.tagName;
  return (tag==='INPUT' || tag==='SELECT' || tag==='TEXTAREA') && document.getElementById('content').contains(a);
}

async function loadState(){
  var cached = readCache();
  if(cached){ state = cached; render(); }
  if(!isConfigured()){
    if(!state){ state = defaultState(); render(); }
    setSyncStatus('未設定(設定タブを確認)', 'warn');
    return;
  }
  setSyncStatus('読み込み中…');
  try{
    var res = await fetch(SCRIPT_URL, {method:'GET'});
    var data = await res.json();
    state = (data && data.partners) ? data : defaultState();
    writeCache(state);
    render();
    setSyncStatus('同期済み', 'ok');
    startPolling();
  }catch(e){
    if(!state){ state = defaultState(); render(); }
    setSyncStatus('オフライン', 'warn');
    startPolling();
  }
}

async function saveState(){
  writeCache(state);
  if(!isConfigured()){
    setSyncStatus('未設定(設定タブを確認)', 'warn');
    return;
  }
  isSaving = true;
  setSyncStatus('保存中…');
  try{
    await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(state)
    });
    setSyncStatus('同期済み', 'ok');
    showToast('同期しました');
  }catch(e){
    setSyncStatus('オフライン(後で同期)', 'warn');
    showToast('オフラインのため保存待ちです');
  }
  isSaving = false;
}

var pollTimer = null;
function startPolling(){
  if(pollTimer) return;
  pollTimer = setInterval(pollServer, POLL_MS);
  window.addEventListener('online', pollServer);
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) pollServer(); });
}
async function pollServer(){
  if(!isConfigured() || isSaving || isEditingNow() || pendingDelete) return;
  try{
    var res = await fetch(SCRIPT_URL, {method:'GET'});
    var data = await res.json();
    if(data && data.partners && JSON.stringify(data)!==JSON.stringify(state)){
      state = data;
      writeCache(state);
      render();
    }
    setSyncStatus('同期済み', 'ok');
  }catch(e){
    setSyncStatus('オフライン', 'warn');
  }
}

var toastTimer = null;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1600);
}

function render(){
  if(activeTab==='home') renderHome(); else renderSettings();
}

function renderHome(){
  var todayStr = todayISO();
  var visible = state.tasks.filter(function(t){
    var d = daysUntilDue(t);
    if(isDoneToday(t)) return true;
    return activeScope==='today' ? d<=0 : d<=6;
  });
  visible.sort(function(a,b){
    var aDone = isDoneToday(a), bDone = isDoneToday(b);
    if(aDone!==bDone) return aDone?1:-1;
    return daysUntilDue(a)-daysUntilDue(b);
  });
  var total = visible.length;
  var done = visible.filter(isDoneToday).length;
  var pct = total>0 ? Math.round(done/total*100) : 0;

  var html = '';
  html += '<div class="segmented">';
  html += '<button class="seg-btn '+(activeScope==='today'?'active':'')+'" data-action="switch-scope" data-scope="today">今日</button>';
  html += '<button class="seg-btn '+(activeScope==='week'?'active':'')+'" data-action="switch-scope" data-scope="week">今週</button>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="progress-top"><span>'+(activeScope==='today'?'今日の進み':'今週の進み')+'</span><span>'+done+'/'+total+'</span></div>';
  html += '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%;"></div></div>';
  html += '</div>';

  if(total===0){
    html += '<p class="empty-note">'+(activeScope==='today' ? '今日やることはありません 🎉' : '今週やることはありません 🎉')+'</p>';
  }else{
    var grouped = {};
    var order = [];
    visible.forEach(function(t){
      if(!grouped[t.roomId]){ grouped[t.roomId]=[]; order.push(t.roomId); }
      grouped[t.roomId].push(t);
    });
    order.forEach(function(roomId){
      var room = roomById(roomId);
      if(!room) return;
      html += '<div class="room-block">';
      html += '<div class="room-head"><span>'+room.icon+'</span><span>'+esc(room.name)+'</span></div>';
      grouped[roomId].forEach(function(t){
        var p = partnerById(t.assigneeId);
        var doneFlag = isDoneToday(t);
        var freqLabel = t.intervalDays===1 ? '毎日' : t.intervalDays+'日ごと';
        html += '<div class="task-row">';
        html += '<button class="check-btn '+(doneFlag?'done':'')+'" data-action="toggle-done" data-task-id="'+t.id+'" aria-label="'+(doneFlag?'完了を取り消す':'完了にする')+'">✓</button>';
        html += '<div class="task-body">';
        html += '<p class="task-name '+(doneFlag?'done':'')+'">'+esc(t.name)+'</p>';
        html += '<p class="task-meta">'+freqLabel+' ・ 前回 '+(doneFlag?'今日':(t.lastDone?fmtShort(t.lastDone):'まだ'))+'</p>';
        html += '</div>';
        if(p){
          html += '<div class="avatar" style="background:'+p.color+';color:'+contrastText(p.color)+';">'+esc(p.name.slice(0,1))+'</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    });
  }
  document.getElementById('content').innerHTML = html;
}

function freqPreset(days){
  if(days===1) return 'daily';
  if(days===7) return 'weekly';
  if(days===30) return 'monthly';
  return 'custom';
}

function renderSettings(){
  var html = '';
  if(!isConfigured()){
    html += '<div class="card" style="background:#FFF3E0;">';
    html += '<p style="margin:0 0 8px;font-size:13px;font-weight:700;">⚠️ まだ同期設定がされていません</p>';
    html += '<p style="margin:0;font-size:12.5px;color:var(--ink);line-height:1.6;">Googleスプレッドシート + Apps Scriptで同期する設定が必要です。手順はチャットの説明を見て、発行されたURLをHTMLファイル内の SCRIPT_URL に貼り付けてください。それまでは、この端末の中だけにデータが保存されます。</p>';
    html += '</div>';
  }else{
    html += '<button class="add-link" data-action="manual-sync" style="margin-bottom:10px;">🔄 今すぐ同期する</button>';
  }
  html += '<p class="section-title">ふたりの設定</p>';
  html += '<div class="partner-row">';
  state.partners.forEach(function(p){
    html += '<div class="partner-card">';
    html += '<div class="partner-avatar-preview" style="background:'+p.color+';color:'+contrastText(p.color)+';">'+esc((p.name||' ').slice(0,1))+'</div>';
    html += '<input class="text-input" data-action="partner-name" data-partner-id="'+p.id+'" value="'+esc(p.name)+'" maxlength="10">';
    html += '<div class="swatch-row">';
    PARTNER_PALETTE.forEach(function(c){
      html += '<button class="swatch '+(p.color===c?'selected':'')+'" style="background:'+c+';" data-action="partner-color" data-partner-id="'+p.id+'" data-color="'+c+'"></button>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  html += '<p class="section-title">場所と家事</p>';
  state.rooms.forEach(function(room){
    html += '<div class="room-card">';
    html += '<div class="room-card-head">';
    html += '<select class="icon-select" data-action="room-icon" data-room-id="'+room.id+'">';
    ICON_OPTIONS.forEach(function(ic){
      html += '<option value="'+ic+'" '+(ic===room.icon?'selected':'')+'>'+ic+'</option>';
    });
    html += '</select>';
    html += '<input class="room-name-input" data-action="room-name" data-room-id="'+room.id+'" value="'+esc(room.name)+'" maxlength="14">';
    if(pendingDelete===('room:'+room.id)){
      html += '<span class="confirm-row">削除する？<button class="delete-x" data-action="confirm-delete-room" data-room-id="'+room.id+'" style="color:#C0392B;">はい</button><button class="delete-x" data-action="cancel-delete" style="color:var(--muted);">やめる</button></span>';
    }else{
      html += '<button class="icon-btn" data-action="delete-room" data-room-id="'+room.id+'" aria-label="場所を削除">🗑️</button>';
    }
    html += '</div>';
    html += '<div class="room-color-row">';
    ROOM_PALETTE.forEach(function(c){
      html += '<button class="swatch '+(room.color===c?'selected':'')+'" style="background:'+c+';" data-action="room-color" data-room-id="'+room.id+'" data-color="'+c+'"></button>';
    });
    html += '</div>';

    var tasks = state.tasks.filter(function(t){ return t.roomId===room.id; });
    tasks.forEach(function(t){
      var preset = freqPreset(t.intervalDays);
      html += '<div class="setting-task-row">';
      html += '<input class="setting-task-name" data-action="task-name" data-task-id="'+t.id+'" value="'+esc(t.name)+'" maxlength="24">';
      html += '<button class="freq-btn '+(preset==='daily'?'active':'')+'" data-action="task-interval-preset" data-task-id="'+t.id+'" data-value="1">毎日</button>';
      html += '<button class="freq-btn '+(preset==='weekly'?'active':'')+'" data-action="task-interval-preset" data-task-id="'+t.id+'" data-value="7">週1</button>';
      html += '<button class="freq-btn '+(preset==='monthly'?'active':'')+'" data-action="task-interval-preset" data-task-id="'+t.id+'" data-value="30">月1</button>';
      html += '<span class="freq-custom"><input type="number" min="1" max="365" data-action="task-interval" data-task-id="'+t.id+'" value="'+t.intervalDays+'">日ごと</span>';
      html += '<select class="assignee-select" data-action="task-assignee" data-task-id="'+t.id+'">';
      state.partners.forEach(function(p){
        html += '<option value="'+p.id+'" '+(p.id===t.assigneeId?'selected':'')+'>'+esc(p.name)+'</option>';
      });
      html += '</select>';
      if(pendingDelete===('task:'+t.id)){
        html += '<span class="confirm-row">削除？<button class="delete-x" data-action="confirm-delete-task" data-task-id="'+t.id+'" style="color:#C0392B;">はい</button><button class="delete-x" data-action="cancel-delete" style="color:var(--muted);">やめる</button></span>';
      }else{
        html += '<button class="delete-x" data-action="delete-task" data-task-id="'+t.id+'" aria-label="家事を削除">×</button>';
      }
      html += '</div>';
    });
    html += '<button class="add-link" data-action="add-task" data-room-id="'+room.id+'">＋ 家事を追加</button>';
    html += '</div>';
  });
  html += '<button class="add-room-btn" data-action="add-room">＋ 場所を追加</button>';
  html += '<button class="reset-link" data-action="reset-all">初期設定にリセット</button>';
  document.getElementById('content').innerHTML = html;
}

document.addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.dataset.action;

  if(action==='switch-tab'){
    activeTab = el.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    pendingDelete = null;
    render();
    return;
  }
  if(action==='switch-scope'){
    activeScope = el.dataset.scope;
    render();
    return;
  }
  if(action==='toggle-done'){
    var task = state.tasks.find(function(t){ return t.id===el.dataset.taskId; });
    if(!task) return;
    if(isDoneToday(task)){
      task.lastDone = task._prevLastDone !== undefined ? task._prevLastDone : null;
    }else{
      task._prevLastDone = task.lastDone || null;
      task.lastDone = todayISO();
    }
    saveState();
    render();
    return;
  }
  if(action==='partner-color'){
    var partner = partnerById(el.dataset.partnerId);
    partner.color = el.dataset.color;
    saveState(); render();
    return;
  }
  if(action==='room-color'){
    var room = roomById(el.dataset.roomId);
    room.color = el.dataset.color;
    saveState(); render();
    return;
  }
  if(action==='delete-room'){
    pendingDelete = 'room:'+el.dataset.roomId;
    render();
    return;
  }
  if(action==='delete-task'){
    pendingDelete = 'task:'+el.dataset.taskId;
    render();
    return;
  }
  if(action==='cancel-delete'){
    pendingDelete = null;
    render();
    return;
  }
  if(action==='confirm-delete-room'){
    var rid = el.dataset.roomId;
    state.rooms = state.rooms.filter(function(r){ return r.id!==rid; });
    state.tasks = state.tasks.filter(function(t){ return t.roomId!==rid; });
    pendingDelete = null;
    saveState(); render();
    return;
  }
  if(action==='confirm-delete-task'){
    var tid = el.dataset.taskId;
    state.tasks = state.tasks.filter(function(t){ return t.id!==tid; });
    pendingDelete = null;
    saveState(); render();
    return;
  }
  if(action==='task-interval-preset'){
    var t2 = state.tasks.find(function(t){ return t.id===el.dataset.taskId; });
    t2.intervalDays = parseInt(el.dataset.value,10);
    saveState(); render();
    return;
  }
  if(action==='add-task'){
    var newTask = {id:uid(), roomId:el.dataset.roomId, name:'新しい家事', intervalDays:7, assigneeId:state.partners[0].id, lastDone:null};
    state.tasks.push(newTask);
    saveState(); render();
    setTimeout(function(){
      var input = document.querySelector('[data-action="task-name"][data-task-id="'+newTask.id+'"]');
      if(input){ input.focus(); input.select(); }
    },0);
    return;
  }
  if(action==='add-room'){
    var newRoom = {id:uid(), name:'新しい場所', color:ROOM_PALETTE[state.rooms.length % ROOM_PALETTE.length], icon:'✨'};
    state.rooms.push(newRoom);
    saveState(); render();
    setTimeout(function(){
      var input = document.querySelector('[data-action="room-name"][data-room-id="'+newRoom.id+'"]');
      if(input){ input.focus(); input.select(); }
    },0);
    return;
  }
  if(action==='manual-sync'){
    showToast('同期しています…');
    pollServer();
    return;
  }
  if(action==='reset-all'){
    pendingDelete = (pendingDelete==='reset-confirm') ? null : 'reset-confirm';
    if(pendingDelete===null){
      state = defaultState();
      saveState(); render();
    }else{
      el.textContent = 'もう一度押すと初期設定に戻ります';
      setTimeout(function(){ if(pendingDelete==='reset-confirm'){ pendingDelete=null; render(); } }, 3000);
    }
    return;
  }
});

document.addEventListener('change', function(e){
  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.dataset.action;
  if(action==='partner-name'){
    partnerById(el.dataset.partnerId).name = el.value.trim() || 'パートナー';
    saveState(); render();
  }else if(action==='room-name'){
    roomById(el.dataset.roomId).name = el.value.trim() || '新しい場所';
    saveState(); render();
  }else if(action==='room-icon'){
    roomById(el.dataset.roomId).icon = el.value;
    saveState();
  }else if(action==='task-name'){
    var t = state.tasks.find(function(x){ return x.id===el.dataset.taskId; });
    t.name = el.value.trim() || '新しい家事';
    saveState(); render();
  }else if(action==='task-interval'){
    var t2 = state.tasks.find(function(x){ return x.id===el.dataset.taskId; });
    var v = parseInt(el.value,10);
    t2.intervalDays = (isNaN(v) || v<1) ? 1 : Math.min(v,365);
    saveState(); render();
  }else if(action==='task-assignee'){
    var t3 = state.tasks.find(function(x){ return x.id===el.dataset.taskId; });
    t3.assigneeId = el.value;
    saveState(); render();
  }
});

loadState();
</script>
</body>
</html>
